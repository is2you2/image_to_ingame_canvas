<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Aspect → Remap → Generate (Unified)</title>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
        }

        h2 {
            margin-top: 0;
        }

        .panel {
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-size: 13px;
            opacity: 0.9;
        }

        input[type="file"],
        textarea,
        select,
        button {
            background: #222;
            color: #eee;
            border: 1px solid #555;
            padding: 4px 6px;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        #log {
            white-space: pre-wrap;
            font-size: 12px;
            background: #000;
            padding: 6px;
            max-height: 160px;
            overflow: auto;
        }
    </style>
</head>

<body>

    <h2>Aspect → Palette Remap → ADB Generate</h2>

    <!-- ================= TOP CONFIG ================= -->

    <div class="panel">
        <h3>0) Load Config Files</h3>

        <div class="row">
            <label>
                Aspect / Canvas Config JSON
                <input type="file" id="aspectConfigInput" accept=".json">
            </label>

            <label>
                Palette JSON
                <input type="file" id="paletteInput" accept=".json">
            </label>
        </div>
    </div>

    <div class="panel">
        <h3>0-1) Start Script (run once)</h3>
        <textarea id="startCmdInput" rows="5" placeholder="예:
adb shell am start -n com.example/.MainActivity
sleep 2
"></textarea>
    </div>

    <div class="panel">
        <h3>Status</h3>
        <div id="log">Waiting for config files...</div>
    </div>

    <script>
        /* =================================================
           GLOBAL CONTEXT
        ================================================= */

        const CTX = {
            // configs
            aspectConfig: null,
            palette: null,

            // images / canvases (filled later)
            sourceImage: null,
            aspectCanvas: null,
            aspectCtx: null,

            remapCanvas: null,
            remapCtx: null,

            // runtime
            selectedRatio: null,
            scale: 1,

            // generated script
            bashScript: ""
        };

        /* =================================================
           UI ELEMENTS
        ================================================= */

        const aspectConfigInput = document.getElementById("aspectConfigInput");
        const paletteInput = document.getElementById("paletteInput");
        const startCmdInput = document.getElementById("startCmdInput");
        const logEl = document.getElementById("log");

        /* =================================================
           LOG
        ================================================= */

        function log(msg) {
            logEl.textContent += msg + "\n";
            logEl.scrollTop = logEl.scrollHeight;
        }

        /* =================================================
           JSON LOADERS
        ================================================= */

        aspectConfigInput.addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    CTX.aspectConfig = JSON.parse(reader.result);
                    log("Aspect / Canvas config loaded.");
                    checkReady();
                } catch (err) {
                    alert("Aspect config JSON error:\n" + err.message);
                }
            };
            reader.readAsText(file);
        });

        paletteInput.addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    CTX.palette = JSON.parse(reader.result);
                    log("Palette JSON loaded.");
                    checkReady();
                } catch (err) {
                    alert("Palette JSON error:\n" + err.message);
                }
            };
            reader.readAsText(file);
        });

        /* =================================================
           READY CHECK
        ================================================= */

        function checkReady() {
            if (!CTX.aspectConfig || !CTX.palette) return;
            log("All base configs ready.");
            // STEP 1 UI will be enabled in PART 2
        }
    </script>

    <!-- ================= STEP 1 : ASPECT CANVAS ================= -->

    <div class="panel">
        <h3>1) Aspect Canvas</h3>

        <div class="row">
            <label>
                Source Image
                <input type="file" id="imageInput" accept="image/*">
            </label>

            <label>
                Aspect Ratio
                <select id="ratioSelect"></select>
            </label>

            <label>
                Scale
                <input type="range" id="scaleInput" min="0.25" max="4" step="0.05" value="1">
            </label>

            <span id="scaleLabel">1.00×</span>
        </div>

        <canvas id="aspectCanvas" style="margin-top:10px; background:#000;"></canvas>
    </div>

    <script>
        /* =================================================
           STEP 1 UI ELEMENTS
        ================================================= */

        const imageInput = document.getElementById("imageInput");
        const ratioSelect = document.getElementById("ratioSelect");
        const scaleInput = document.getElementById("scaleInput");
        const scaleLabel = document.getElementById("scaleLabel");

        CTX.aspectCanvas = document.getElementById("aspectCanvas");
        CTX.aspectCtx = CTX.aspectCanvas.getContext("2d");

        /* =================================================
           POPULATE RATIO SELECT
        ================================================= */

        function populateRatioSelect() {
            ratioSelect.innerHTML = "";

            for (const ratio in CTX.aspectConfig) {
                const opt = document.createElement("option");
                opt.value = ratio;
                opt.textContent = ratio;
                ratioSelect.appendChild(opt);
            }

            CTX.selectedRatio = ratioSelect.value;
        }

        /* =================================================
           IMAGE LOADING
        ================================================= */

        imageInput.addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.onload = () => {
                CTX.sourceImage = img;
                log(`Source image loaded: ${img.width}×${img.height}`);
                redrawAspectCanvas();
            };
            img.src = URL.createObjectURL(file);
        });

        /* =================================================
           RATIO / SCALE EVENTS
        ================================================= */

        ratioSelect.addEventListener("change", () => {
            CTX.selectedRatio = ratioSelect.value;
            redrawAspectCanvas();
        });

        scaleInput.addEventListener("input", () => {
            CTX.scale = parseFloat(scaleInput.value);
            scaleLabel.textContent = CTX.scale.toFixed(2) + "×";
            redrawAspectCanvas();
        });

        /* =================================================
           CENTER-COVER DRAW
        ================================================= */

        function redrawAspectCanvas() {
            if (!CTX.sourceImage || !CTX.selectedRatio) return;

            const cfg = CTX.aspectConfig[CTX.selectedRatio];
            if (!cfg) return;

            const cw = Math.round(cfg.width * CTX.scale);
            const ch = Math.round(cfg.height * CTX.scale);

            const canvas = CTX.aspectCanvas;
            const ctx = CTX.aspectCtx;

            canvas.width = cw;
            canvas.height = ch;

            const img = CTX.sourceImage;

            const scale = Math.max(
                cw / img.width,
                ch / img.height
            );

            const drawW = img.width * scale;
            const drawH = img.height * scale;

            const dx = (cw - drawW) / 2;
            const dy = (ch - drawH) / 2;

            ctx.clearRect(0, 0, cw, ch);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, dx, dy, drawW, drawH);

            log(`Aspect canvas updated (${CTX.selectedRatio}, scale ${CTX.scale.toFixed(2)})`);
        }

        /* =================================================
           ENABLE STEP 1 WHEN CONFIG READY
        ================================================= */

        (function waitForConfig() {
            if (!CTX.aspectConfig) {
                setTimeout(waitForConfig, 100);
                return;
            }
            populateRatioSelect();
        })();
    </script>
    <!-- ================= STEP 2 : PALETTE REMAP ================= -->

    <div class="panel">
        <h3>2) Palette Remap (Preview)</h3>

        <div class="row">
            <button id="remapBtn">Remap Image</button>
            <span id="remapStatus">Waiting...</span>
        </div>

        <canvas id="remapCanvas" style="margin-top:10px; background:#000;"></canvas>
    </div>

    <script>
        /* =================================================
           STEP 2 ELEMENTS
        ================================================= */

        const remapBtn = document.getElementById("remapBtn");
        const remapStatus = document.getElementById("remapStatus");

        CTX.remapCanvas = document.getElementById("remapCanvas");
        CTX.remapCtx = CTX.remapCanvas.getContext("2d");

        /* =================================================
           PALETTE UTILS
        ================================================= */

        function hexToRgb(hex) {
            hex = hex.replace("#", "");
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function colorDistance(a, b) {
            const dr = a.r - b.r;
            const dg = a.g - b.g;
            const db = a.b - b.b;
            return dr * dr + dg * dg + db * db;
        }

        function findNearestPaletteColor(rgb) {
            let best = null;
            let bestDist = Infinity;

            for (const p of CTX.palette) {
                const d = colorDistance(rgb, hexToRgb(p.color));
                if (d < bestDist) {
                    bestDist = d;
                    best = p;
                }
            }
            return best;
        }

        /* =================================================
           REMAP CORE
        ================================================= */

        remapBtn.addEventListener("click", () => {
            if (!CTX.palette || !CTX.palette.length) {
                alert("Palette JSON not loaded");
                return;
            }
            if (!CTX.aspectCanvas.width) {
                alert("Aspect canvas is empty");
                return;
            }

            remapImage();
        });

        function remapImage() {
            remapStatus.textContent = "Processing...";

            const srcCanvas = CTX.aspectCanvas;
            const srcCtx = CTX.aspectCtx;

            const w = srcCanvas.width;
            const h = srcCanvas.height;

            const dstCanvas = CTX.remapCanvas;
            const dstCtx = CTX.remapCtx;

            dstCanvas.width = w;
            dstCanvas.height = h;

            const srcData = srcCtx.getImageData(0, 0, w, h).data;
            const outImage = dstCtx.createImageData(w, h);
            const out = outImage.data;

            for (let i = 0; i < srcData.length; i += 4) {
                const r = srcData[i];
                const g = srcData[i + 1];
                const b = srcData[i + 2];
                const a = srcData[i + 3];

                if (a === 0) {
                    out[i] = 0;
                    out[i + 1] = 0;
                    out[i + 2] = 0;
                    out[i + 3] = 0;
                    continue;
                }

                const nearest = findNearestPaletteColor({ r, g, b });

                if (nearest) {
                    const color = hexToRgb(nearest.color);
                    out[i] = color.r;
                    out[i + 1] = color.g;
                    out[i + 2] = color.b;
                    out[i + 3] = a;
                } else {
                    out[i] = r;
                    out[i + 1] = g;
                    out[i + 2] = b;
                    out[i + 3] = a;
                }
            }

            dstCtx.putImageData(outImage, 0, 0);

            CTX.remappedImageReady = true;
            remapStatus.textContent = `Done (${w}×${h})`;

            log(`Palette remap complete (${w}x${h})`);
        }
    </script>
    <!-- ================= STEP 3 : GENERATE (SILENT) ================= -->

    <div class="panel">
        <h3>3) Generate ADB Script</h3>

        <button id="exportBtn" disabled>Export bash</button>
        <div id="genStatus" style="margin-top:6px;">Waiting...</div>
    </div>

    <script>
        /* =================================================
           STEP 3 ELEMENTS
        ================================================= */

        const exportBtn = document.getElementById("exportBtn");
        const genStatus = document.getElementById("genStatus");

        /* =================================================
           UTILS
        ================================================= */

        function keyXY(x, y) {
            return x + "," + y;
        }

        function parseKey(k) {
            const [x, y] = k.split(",").map(Number);
            return { x, y };
        }

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join("");
        }

        function parseRatioString(ratioStr) {
            const [w, h] = ratioStr.split(":").map(Number);
            if (!w || !h) return null;
            return w / h;
        }

        function selectBestCanvasConfigForImage(w, h, cfgArr) {
            const r = w / h;
            let best = null;
            let bestDiff = Infinity;

            for (const cfg of cfgArr) {
                const cr = parseRatioString(cfg.ratio);
                if (!cr) continue;
                const diff = Math.abs(cr - r);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    best = cfg;
                }
            }
            return best;
        }

        /* =================================================
           ENABLE EXPORT WHEN REMAP READY
        ================================================= */

        (function watchRemap() {
            if (CTX.remappedImageReady) {
                exportBtn.disabled = false;
                genStatus.textContent = "Ready to export";
                return;
            }
            setTimeout(watchRemap, 200);
        })();

        /* =================================================
           GENERATE CORE
        ================================================= */

        exportBtn.addEventListener("click", () => {
            try {
                const bash = generateBash();
                downloadBash(bash);
                genStatus.textContent = "Exported";
            } catch (err) {
                alert(err.message);
            }
        });

        function computeSwipeDuration(pxLength) {

            const base = 50;      // 최소 duration
            const factor = 20;     // 픽셀당 추가 ms
            const max = 600;      // 너무 길어지는 것 방지

            const d = base + pxLength * factor;

            return Math.min(d, max);
        }

        function normalizeAdb(cmd) {

            // adb shell heredoc
            cmd = cmd.replace(/adb\s+shell\s+<<'EOF'/g, "");

            // adb shell command
            cmd = cmd.replace(/adb\s+shell\s+/g, "");

            // 혹시 남은 adb shell
            cmd = cmd.replace(/^\s*adb\s+shell\s*$/gm, "");

            return cmd;
        }

        function buildHorizontalRuns(pixels) {

            const map = new Map();

            for (const p of pixels) {
                if (!map.has(p.y)) map.set(p.y, []);
                map.get(p.y).push(p.x);
            }

            const runs = [];

            for (const [y, xs] of map) {

                xs.sort((a, b) => a - b);

                let start = xs[0];
                let prev = xs[0];

                for (let i = 1; i < xs.length; i++) {

                    const x = xs[i];

                    if (x === prev + 1) {
                        prev = x;
                        continue;
                    }

                    runs.push({ x1: start, x2: prev, y });
                    start = prev = x;
                }

                runs.push({ x1: start, x2: prev, y });
            }

            return runs;
        }

        const MIN_SWIPE_LENGTH = 5;  // 5픽셀 이상부터 swipe 사용 (3~8 사이에서 테스트 추천)

        function buildVerticalRuns(pixels) {
            const map = new Map();  // x → [y들]

            for (const p of pixels) {
                if (!map.has(p.x)) map.set(p.x, []);
                map.get(p.x).push(p.y);
            }

            const runs = [];

            for (const [x, ys] of map) {
                if (ys.length < MIN_SWIPE_LENGTH) continue;

                ys.sort((a, b) => a - b);

                let start = ys[0];
                let prev = ys[0];

                for (let i = 1; i < ys.length; i++) {
                    const y = ys[i];
                    if (y === prev + 1) {
                        prev = y;
                        continue;
                    }

                    if (prev - start + 1 >= MIN_SWIPE_LENGTH) {
                        runs.push({ x, y1: start, y2: prev });
                    }

                    start = prev = y;
                }

                if (prev - start + 1 >= MIN_SWIPE_LENGTH) {
                    runs.push({ x, y1: start, y2: prev });
                }
            }

            return runs;
        }

        function generateBash() {
            if (!CTX.remapCanvas || !CTX.palette || !CTX.aspectConfig) {
                throw new Error("Missing required data");
            }

            let CMD = "#!/bin/bash\n\n";
            CMD += "SECONDS=0\n";
            CMD += `(
while true; do
    printf "\r⏱ %02d:%02d" $((SECONDS/60)) $((SECONDS%60))
    sleep 1
done
) &
TIMER_PID=$!\n`;

            if (CTX.startScript && CTX.startScript.trim()) {
                CMD += CTX.startScript.trim() + "\n\n";
            }

            const canvas = CTX.remapCanvas;
            const ctx = CTX.remapCtx;

            const w = canvas.width;
            const h = canvas.height;

            const imgData = ctx.getImageData(0, 0, w, h).data;

            /* ---------- 1) Color buckets ---------- */

            const buckets = {}; // "#rrggbb" -> [{x,y}]

            let idx = 0;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const r = imgData[idx];
                    const g = imgData[idx + 1];
                    const b = imgData[idx + 2];
                    const a = imgData[idx + 3];
                    idx += 4;

                    if (a === 0) continue;

                    const hex = rgbToHex(r, g, b);
                    if (!buckets[hex]) buckets[hex] = [];
                    buckets[hex].push({ x, y });
                }
            }

            /* ---------- 2) Canvas mapping ---------- */

            const cfg = selectBestCanvasConfigForImage(w, h, CTX.aspectConfig);
            if (!cfg) throw new Error("No matching canvas config");

            const baseX = cfg.startX;
            const baseY = cfg.startY;

            const sizeX = cfg.sizeX ?? (cfg.endX - cfg.startX);
            const sizeY = cfg.sizeY ?? (cfg.endY - cfg.startY);

            const scaleX = sizeX / w;
            const scaleY = sizeY / h;

            const offsetX = scaleX * 0.5;
            const offsetY = scaleY * 0.5;

            /* ---------- 3) Palette-driven commands ---------- */
            /* 순서: horizontal swipe → vertical swipe → 나머지 tap */

            for (const entry of CTX.palette) {
                const color = entry.color;
                const cmd = entry.cmd;

                if (cmd && cmd.trim()) {
                    CMD += cmd + "\n";
                    CMD += "sleep 0.05\n";
                }

                let pixels = buckets[color];
                if (!pixels || !pixels.length) continue;

                // Set으로 빠른 제거/확인을 위해 변환
                const remaining = new Set(pixels.map(p => `${p.x},${p.y}`));

                // ────────────────────────────────
                // 1. Horizontal runs 먼저 처리
                // ────────────────────────────────
                const hRuns = buildHorizontalRuns(pixels);

                for (const run of hRuns) {
                    const len = run.x2 - run.x1 + 1;
                    if (len < MIN_SWIPE_LENGTH) continue;  // 너무 짧으면 skip (아래 tap으로 넘어감)

                    const x1 = Math.round(baseX + run.x1 * scaleX + offsetX);
                    const x2 = Math.round(baseX + run.x2 * scaleX + offsetX);
                    const y = Math.round(baseY + run.y * scaleY + offsetY);

                    const duration = computeSwipeDuration(len - 1);  // 픽셀 간 거리 기준

                    CMD += `input swipe ${x1} ${y} ${x2} ${y} ${duration}\n`;
                    // 필요 시 역방향 추가 (앱에 따라 선 두께/안정성 향상)
                    CMD += `input swipe ${x2} ${y} ${x1} ${y} ${duration}\n`;

                    CMD += `input tap ${x1} ${y}\n`;
                    CMD += `input tap ${x2} ${y}\n`;

                    // 처리한 픽셀 제거
                    for (let x = run.x1; x <= run.x2; x++) {
                        remaining.delete(`${x},${run.y}`);
                    }
                }

                // ────────────────────────────────
                // 2. 남은 픽셀들에서 Vertical runs 처리
                // ────────────────────────────────
                const remainingPixels = Array.from(remaining).map(key => {
                    const [x, y] = key.split(',').map(Number);
                    return { x, y };
                });

                const vRuns = buildVerticalRuns(remainingPixels);   // ← 아래에 함수 정의 필요

                for (const run of vRuns) {
                    const len = run.y2 - run.y1 + 1;
                    if (len < MIN_SWIPE_LENGTH) continue;

                    const x = Math.round(baseX + run.x * scaleX + offsetX);
                    const y1 = Math.round(baseY + run.y1 * scaleY + offsetY);
                    const y2 = Math.round(baseY + run.y2 * scaleY + offsetY);

                    const duration = computeSwipeDuration(len - 1);

                    CMD += `input swipe ${x} ${y1} ${x} ${y2} ${duration}\n`;
                    // 필요 시 역방향
                    CMD += `input swipe ${x} ${y2} ${x} ${y1} ${duration}\n`;

                    CMD += `input tap ${x} ${y1}\n`;
                    CMD += `input tap ${x} ${y2}\n`;

                    // 처리한 픽셀 제거
                    for (let y = run.y1; y <= run.y2; y++) {
                        remaining.delete(`${run.x},${y}`);
                    }
                }

                // ────────────────────────────────
                // 3. 최종 남은 픽셀 → tap
                // ────────────────────────────────
                for (const key of remaining) {
                    const [px, py] = key.split(',').map(Number);
                    const tx = Math.round(baseX + px * scaleX + offsetX);
                    const ty = Math.round(baseY + py * scaleY + offsetY);
                    CMD += `input tap ${tx} ${ty}\n`;
                    CMD += `input tap ${tx} ${ty}\n`;
                }
            }

            CMD += `kill $TIMER_PID 2>/dev/null
wait $TIMER_PID 2>/dev/null
echo
printf "✔ Total: %02d:%02d\n" $((SECONDS/60)) $((SECONDS%60))`;

            CMD = normalizeAdb(CMD);
            return CMD;
        }

        /* =================================================
           EXPORT
        ================================================= */

        function downloadBash(text) {
            const blob = new Blob([text], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "auto_input.bash";
            a.click();
        }
    </script>
</body>

</html>
